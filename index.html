document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ign Director\", \"Webflow\"],\n    [\"May Li Khoe\", \"Co-Founder\", \"Sprout\"],\n    [\"Leslie Yang\", \"Head of Design — Core Systems & Platforms\", \"Lyft\"],\n    [\"Si Min Lee\", \"Staff Product Designer\", \"Anthropic\"],\n    [\"Pablo Stanley\", \"Staff Product Designer\", \"Vercel\"],\n    [\"Jason Chan\", \"Head of Design\", \"Quora\"],\n    [\"Linda Dong\", \"Design\", \"Apple\"],\n    [\"Benjamin Wilkins\", \"Design Lead\", \"Meta Superintelligence Labs\"],\n    [\"Rebecca Rabison\", \"Senior Director, Product Design\", \"Checkr\"],\n    [\"Brent Loosli\", \"Principal Designer\", \"Airbnb\"],\n    [\"Christophe Tauziet\", \"Head of Design\", \"Plaid\"],\n    [\"Mike Stern\", \"Sr. Manager, Design Evangelism\", \"Apple\"],\n    [\"Justin Stahl\", \"Director of Product Design\", \"Meta\"],\n    [\"Kirsty Ewing\", \"Director of UX — AI Generation Engine\", \"SandboxAQ\"],\n    [\"Christian Ervin\", \"Head of Design\", \"Glean\"],\n    [\"Malay Vasa\", \"Head of Design\", \"Composio\"],\n    [\"Sheta Chatterjee\", \"Head of Design — Cloud AI\", \"Google\"],\n    [\"Evelyn Kim\", \"Head of Product Design\", \"Snowflake\"],\n    [\"Cammy Lin\", \"Sr. Design Manager\", \"Everlaw\"],\n    [\"Alexa Stahl\", \"Sr. Product Designer\", \"Zendesk\"],\n    [\"Hannah Hearth\", \"Head of Product Design\", \"Vercel\"],\n    [\"Julie Zhuo\", \"Founder\", \"Sundial\"],\n    [\"Collin Whitehead\", \"VP of Design\", \"Superhuman\"],\n    [\"Jaime Mariko McFarland\", \"VP, Head of Design\", \"Airtable\"],\n    [\"Kyle Turman\", \"Design Leadership\", \"Anthropic\"],\n    [\"Chelsea Larsson\", \"Head of Content Design\", \"Anthropic\"],\n    [\"Julie Xu\", \"Staff Product Designer\", \"Kraken\"],\n    [\"Meaghan Choi\", \"Design Manager\", \"Anthropic\"],\n    [\"Amelia Wattenberger\", \"Partner — AI & UX Innovation\", \"Sutter Hill Ventures\"],\n    [\"Nick Foster\", \"Former Head of Design\", \"Google X\"],\n    [\"Liana Dumitru\", \"Director of Design\", \"Mercury\"],\n    [\"Frank Bach\", \"Designer\", \"Anthropic\"],\n    [\"Jeff Smith\", \"Founder\", \"Fieldwork Software\"],\n    [\"Joel Califa\", \"VP Design\", \"Unify\"],\n    [\"Peter Yang\", \"Principal Product Manager\", \"Roblox\"],\n    [\"Dabney Donigan\", \"Director, Product Design\", \"Discord\"],\n    [\"Tin Kadoić\", \"Head of dOS\", \"OpenAI\"],\n    [\"Libby Varcoe\", \"Head of Content\", \"Atlassian\"],\n    [\"Julie Stanescu\", \"Founder\", \"RETHINK\"]\n  ];\n\n  // Featured companies get a colour. Keyed by a prefix match so\n  // \"Meta Superintelligence Labs\" -> Meta, \"Google X\" -> Google.\n  const FEATURED = [\n    [\"Anthropic\", 40],\n    [\"Atlassian\", 250],\n    [\"Apple\",     288],\n    [\"Google\",    150],\n    [\"Meta\",      268],\n    [\"Vercel\",    330],\n    [\"OpenAI\",    190],\n    [\"Airbnb\",    18],\n    [\"Dropbox\",   228]\n  ];\n\n  function featuredFor(company) {\n    for (const [key, hue] of FEATURED) {\n      if (company === key || company.startsWith(key + \" \")) return { key, hue };\n    }\n    return null;\n  }\n  const coInk = h => `oklch(0.55 0.12 ${h})`;\n  const coBg  = h => `oklch(0.95 0.035 ${h})`;\n\n  function initials(name) {\n    const parts = name.replace(/[().,]/g, \"\").split(/\\s+/).filter(Boolean);\n    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();\n    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();\n  }\n\n  // Exact LinkedIn profile URLs, keyed by lowercased name.\n  const LINKEDIN = {\n    \"joel lewenstein\": \"https://www.linkedin.com/in/joel-lewenstein/\",\n    \"charlie sutton\": \"https://www.linkedin.com/in/charliesutton/\",\n    \"david hoang\": \"https://www.linkedin.com/in/dhoang2/\",\n    \"grace kraus\": \"https://www.linkedin.com/in/grace-kraus-88902929\",\n    \"ian spalter\": \"https://www.linkedin.com/in/ianspalter\",\n    \"jian wei\": \"https://www.linkedin.com/in/findjw/\",\n    \"bob baxley\": \"https://www.linkedin.com/in/bbaxley/\",\n    \"tina chen\": \"https://www.linkedin.com/in/tinachensf/\",\n    \"erica deahl\": \"https://www.linkedin.com/in/ericadeahl/\",\n    \"may li khoe\": \"https://www.linkedin.com/in/maylikhoe/\",\n    \"leslie yang\": \"https://www.linkedin.com/in/leslie-yang-design/\",\n    \"si min lee\": \"https://www.linkedin.com/in/siminlee/\",\n    \"pablo stanley\": \"https://www.linkedin.com/in/pablostanley1/\",\n    \"jason chan\": \"https://www.linkedin.com/in/jasonjchan/\",\n    \"linda dong\": \"https://www.linkedin.com/in/lindadong/\",\n    \"benjamin wilkins\": \"https://www.linkedin.com/in/benjaminwilkins/\",\n    \"rebecca rabison\": \"https://www.linkedin.com/in/rebeccarabison\",\n    \"brent loosli\": \"https://www.linkedin.com/in/brentloosli\",\n    \"christophe tauziet\": \"https://www.linkedin.com/in/christophetauziet/\",\n    \"mike stern\": \"https://www.linkedin.com/in/mistern/\",\n    \"justin stahl\": \"https://www.linkedin.com/in/justahl\",\n    \"kirsty ewing\": \"https://www.linkedin.com/in/kirstyewing\",\n    \"christian ervin\": \"https://www.linkedin.com/in/christianervin\",\n    \"malay vasa\": \"https://www.linkedin.com/in/malayvasa\",\n    \"sheta chatterjee\": \"https://www.linkedin.com/in/shetachatterjee\",\n    \"evelyn kim\": \"https://www.linkedin.com/in/evelyn-kim-9b233721\",\n    \"cammy lin\": \"https://www.linkedin.com/in/hellokaymee/\",\n    \"alexa stahl\": \"https://www.linkedin.com/in/aherasimchuk/\",\n    \"hannah hearth\": \"https://www.linkedin.com/in/hannah-hearth-771a0a22\",\n    \"julie zhuo\": \"https://www.linkedin.com/in/julie-zhuo/\",\n    \"collin whitehead\": \"https://www.linkedin.com/in/collinwhitehead/\",\n    \"jaime mariko mcfarland\": \"https://www.linkedin.com/in/jaime-mariko-mcfarland-32780b44\",\n    \"kyle turman\": \"https://www.linkedin.com/in/kyleturman/\",\n    \"chelsea larsson\": \"https://www.linkedin.com/in/chelsealarsson/\",\n    \"julie xu\": \"https://www.linkedin.com/in/jyxu/\",\n    \"meaghan choi\": \"https://www.linkedin.com/in/meaghanchoi/\",\n    \"amelia wattenberger\": \"https://www.linkedin.com/in/wattenberger/\",\n    \"nick foster\": \"https://www.linkedin.com/in/nickfosterrdi/\",\n    \"liana dumitru\": \"https://www.linkedin.com/in/lianadumitru/\",\n    \"peter yang\": \"https://www.linkedin.com/in/petergyang/\",\n    \"dabney donigan\": \"https://www.linkedin.com/in/dabneydonigan/\",\n    \"tin kadoić\": \"https://www.linkedin.com/in/blackduke/\",\n    \"libby varcoe\": \"https://www.linkedin.com/in/libbyvarcoe/\",\n    \"frank bach\": \"https://www.linkedin.com/in/francoisbach/\",\n    \"jeff smith\": \"https://www.linkedin.com/in/jeffmatthewsmith/\",\n    \"joel califa\": \"https://www.linkedin.com/in/califa\",\n    \"julie stanescu\": \"https://www.linkedin.com/in/juliestanescu\"\n  };\n\n  function linkedin(name, company) {\n    const url = LINKEDIN[name.toLowerCase()];\n    if (url) return url;\n    // Fallback for anyone without a known URL: first-result redirect.\n    return \"https://duckduckgo.com/?q=\" + encodeURIComponent(`\\\\ ${name} ${company} site:linkedin.com/in`);\n  }\n\n  // ---------- Interest facets ----------\n  const FACETS = [\n    { id: \"ai\",        label: \"AI & Intelligent Products\",     short: \"AI\",        hue: 40 },\n    { id: \"platforms\", label: \"Design Systems & Platforms\",    short: \"Systems\",   hue: 250 },\n    { id: \"devtools\",  label: \"Developer & Productivity Tools\", short: \"Dev Tools\", hue: 195 },\n    { id: \"content\",   label: \"Content\",        short: \"Content\",   hue: 305 },\n    { id: \"founders\",  label: \"Founders\",       short: \"Founders\",  hue: 135 },\n    { id: \"research\",  label: \"Research\",     short: \"Research\",  hue: 90 },\n    { id: \"craft\",     label: \"Creative Tools & Craft\",        short: \"Craft\",     hue: 20 },\n    { id: \"data\",      label: \"Data & Analytics\",              short: \"Data\",      hue: 220 },\n    { id: \"storytelling\", label: \"Storytelling\",              short: \"Storytelling\", hue: 330 }\n  ];\n  const FACET_BY_ID = Object.fromEntries(FACETS.map(f => [f.id, f]));\n\n  // Inferred areas of interest per guest, from role / company / public work.\n  const INTERESTS = {\n    \"joel lewenstein\": [\"ai\", \"content\"],\n    \"charlie sutton\": [\"devtools\", \"platforms\"],\n    \"david hoang\": [\"ai\", \"content\", \"devtools\"],\n    \"grace kraus\": [\"devtools\"],\n    \"ian spalter\": [\"devtools\", \"craft\"],\n    \"jian wei\": [\"devtools\"],\n    \"bob baxley\": [\"craft\", \"content\"],\n    \"tina chen\": [\"ai\"],\n    \"erica deahl\": [\"craft\", \"devtools\"],\n    \"may li khoe\": [\"craft\", \"founders\"],\n    \"leslie yang\": [\"platforms\"],\n    \"si min lee\": [\"ai\"],\n    \"pablo stanley\": [\"craft\", \"ai\", \"founders\"],\n    \"jason chan\": [\"content\"],\n    \"linda dong\": [\"platforms\", \"craft\"],\n    \"benjamin wilkins\": [\"ai\", \"platforms\"],\n    \"rebecca rabison\": [\"devtools\"],\n    \"brent loosli\": [\"craft\", \"platforms\"],\n    \"christophe tauziet\": [\"devtools\"],\n    \"mike stern\": [\"platforms\", \"content\"],\n    \"justin stahl\": [\"craft\"],\n    \"kirsty ewing\": [\"ai\", \"research\"],\n    \"christian ervin\": [\"ai\", \"devtools\"],\n    \"malay vasa\": [\"ai\", \"devtools\"],\n    \"sheta chatterjee\": [\"ai\"],\n    \"evelyn kim\": [\"devtools\"],\n    \"cammy lin\": [\"devtools\"],\n    \"alexa stahl\": [\"devtools\", \"content\"],\n    \"hannah hearth\": [\"devtools\"],\n    \"julie zhuo\": [\"founders\", \"data\", \"storytelling\"],\n    \"collin whitehead\": [\"devtools\"],\n    \"jaime mariko mcfarland\": [\"devtools\", \"platforms\"],\n    \"kyle turman\": [\"ai\"],\n    \"chelsea larsson\": [\"content\", \"ai\"],\n    \"julie xu\": [\"devtools\"],\n    \"meaghan choi\": [\"ai\"],\n    \"amelia wattenberger\": [\"ai\", \"craft\", \"research\"],\n    \"nick foster\": [\"research\"],\n    \"liana dumitru\": [\"devtools\"],\n    \"peter yang\": [\"content\", \"ai\"],\n    \"dabney donigan\": [\"craft\", \"devtools\"],\n    \"tin kadoić\": [\"ai\", \"platforms\"],\n    \"libby varcoe\": [\"content\"],\n    \"frank bach\": [\"craft\", \"content\", \"ai\"],\n    \"jeff smith\": [\"founders\", \"devtools\"],\n    \"joel califa\": [\"devtools\", \"founders\"],\n    \"julie stanescu\": [\"craft\", \"storytelling\", \"founders\"]\n  };\n  function facetsFor(name) { return INTERESTS[name.toLowerCase()] || []; }\n\n  // ---------- Tweakable defaults ----------\n  const TWEAKS = /*EDITMODE-BEGIN*/{\n    \"deleted\": {\n      \"Anthropic\": false,\n      \"Atlassian\": false,\n      \"Apple\": false,\n      \"Google\": false,\n      \"Meta\": false,\n      \"Vercel\": false,\n      \"OpenAI\": false,\n      \"Airbnb\": false,\n      \"Dropbox\": false\n    },\n    \"colorHighlight\": true\n  }/*EDITMODE-END*/;\n\n  // Original (pre-delete) attendee count per marquee team, for the panel.\n  const ORIG_COUNTS = {};\n  PEOPLE.forEach(p => {\n    const f = featuredFor(p[2]);\n    if (f) ORIG_COUNTS[f.key] = (ORIG_COUNTS[f.key] || 0) + 1;\n  });\n\n  const chipsEl = document.getElementById(\"chips\");\n  const facetsEl = document.getElementById(\"facets\");\n  const grid = document.getElementById(\"grid\");\n  const qEl = document.getElementById(\"q\");\n  let activeCompany = null;\n  let activeFacet = null;\n\n  function isDeleted(company) {\n    const f = featuredFor(company);\n    return f ? !!TWEAKS.deleted[f.key] : false;\n  }\n  function activePeople() {\n    return PEOPLE.filter(p => !isDeleted(p[2]));\n  }\n  // Randomized hues for the non-marquee companies (previously gray).\n  const RANDOM_HUE = (() => {\n    const names = [...new Set(PEOPLE.map(p => p[2]).filter(c => !featuredFor(c)))];\n    for (let i = names.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      [names[i], names[j]] = [names[j], names[i]];\n    }\n    const map = {};\n    names.forEach((n, i) => { map[n] = Math.round((360 / names.length) * i); });\n    return map;\n  })();\n\n  function colorOf(company) {\n    if (!TWEAKS.colorHighlight) return null;\n    const f = featuredFor(company);\n    if (f) return f;\n    return { key: company, hue: RANDOM_HUE[company] };\n  }\n\n  // ---- Company filter chips ----\n  function buildChips(people) {\n    const counts = {};\n    people.forEach(p => { const f = featuredFor(p[2]); if (f) counts[f.key] = (counts[f.key] || 0) + 1; });\n    const chipData = FEATURED\n      .filter(([k]) => counts[k] && !TWEAKS.deleted[k])\n      .sort((a, b) => counts[b[0]] - counts[a[0]] || a[0].localeCompare(b[0]));\n    if (activeCompany && !counts[activeCompany]) activeCompany = null;\n\n    chipsEl.style.display = chipData.length ? \"\" : \"none\";\n    chipsEl.innerHTML = \"\";\n    const all = document.createElement(\"button\");\n    all.className = \"chip\";\n    all.setAttribute(\"aria-pressed\", activeCompany === null);\n    all.innerHTML = `All <span class=\"ct\">${people.length}<\u002Fspan>`;\n    all.onclick = () => { activeCompany = null; refresh(); };\n    chipsEl.appendChild(all);\n\n    chipData.forEach(([key, hue]) => {\n      const b = document.createElement(\"button\");\n      b.className = \"chip\";\n      if (TWEAKS.colorHighlight) b.style.setProperty(\"--c\", coInk(hue));\n      b.setAttribute(\"aria-pressed\", activeCompany === key);\n      b.innerHTML = `<span class=\"dot\"><\u002Fspan>${key} <span class=\"ct\">${counts[key]}<\u002Fspan>`;\n      b.onclick = () => { activeCompany = (activeCompany === key ? null : key); refresh(); };\n      chipsEl.appendChild(b);\n    });\n  }\n\n  // ---- Interest facet navigation ----\n  function buildFacets(people) {\n    const counts = {};\n    people.forEach(p => facetsFor(p[0]).forEach(id => { counts[id] = (counts[id] || 0) + 1; }));\n    if (activeFacet && !counts[activeFacet]) activeFacet = null;\n\n    facetsEl.innerHTML = \"\";\n    const all = document.createElement(\"button\");\n    all.className = \"chip\";\n    all.setAttribute(\"aria-pressed\", activeFacet === null);\n    all.innerHTML = `All guests <span class=\"ct\">${people.length}<\u002Fspan>`;\n    all.onclick = () => { activeFacet = null; refresh(); };\n    facetsEl.appendChild(all);\n\n    FACETS.forEach(f => {\n      if (!counts[f.id]) return;\n      const b = document.createElement(\"button\");\n      b.className = \"chip\";\n      if (TWEAKS.colorHighlight) b.style.setProperty(\"--c\", coInk(f.hue));\n      b.setAttribute(\"aria-pressed\", activeFacet === f.id);\n      b.innerHTML = `<span class=\"dot\"><\u002Fspan>${f.label} <span class=\"ct\">${counts[f.id]}<\u002Fspan>`;\n      b.onclick = () => { activeFacet = (activeFacet === f.id ? null : f.id); refresh(); };\n      facetsEl.appendChild(b);\n    });\n  }\n\n  // ---- Render grid ----\n  function render(people) {\n    const q = qEl.value.trim().toLowerCase();\n    let list = people.filter(([name, role, company]) => {\n      if (activeFacet && !facetsFor(name).includes(activeFacet)) return false;\n      if (activeCompany) {\n        const f = featuredFor(company);\n        if (!f || f.key !== activeCompany) return false;\n      }\n      if (q) {\n        const interestText = facetsFor(name)\n          .map(id => FACET_BY_ID[id].label + \" \" + FACET_BY_ID[id].short).join(\" \");\n        return (name + \" \" + role + \" \" + company + \" \" + interestText).toLowerCase().includes(q);\n      }\n      return true;\n    });\n\n    grid.innerHTML = \"\";\n    if (!list.length) {\n      grid.innerHTML = `<div class=\"empty\">No one matches “${qEl.value}”.<\u002Fdiv>`;\n      updateFoot(0, people.length);\n      return;\n    }\n\n    list.forEach(([name, role, company]) => {\n      const f = colorOf(company);\n      const a = document.createElement(\"a\");\n      a.className = \"card\";\n      a.href = linkedin(name, company);\n      a.target = \"_blank\";\n      a.rel = \"noopener\";\n      a.title = \"Find \" + name + \" on LinkedIn\";\n      a.addEventListener(\"click\", (ev) => {\n        ev.preventDefault();\n        window.open(a.href, \"_blank\", \"noopener\");\n      });\n\n      const av = document.createElement(\"div\");\n      av.className = \"avatar\";\n      av.textContent = initials(name);\n      if (f) {\n        av.style.setProperty(\"--av-bg\", coBg(f.hue));\n        av.style.setProperty(\"--av-ink\", coInk(f.hue));\n      }\n\n      const top = document.createElement(\"div\");\n      top.innerHTML = `<h2 class=\"name\">${name}<\u002Fh2><p class=\"role\">${role}<\u002Fp>`;\n\n      const ints = facetsFor(name);\n      let tags = null;\n      if (ints.length) {\n        tags = document.createElement(\"div\");\n        tags.className = \"interests\";\n        ints.forEach(id => {\n          const fa = FACET_BY_ID[id];\n          const t = document.createElement(\"span\");\n          t.className = \"interest\" + (activeFacet === id ? \" on\" : \"\");\n          t.innerHTML = `<span class=\"d\" style=\"background:${coInk(fa.hue)}\"><\u002Fspan>${fa.short}`;\n          tags.appendChild(t);\n        });\n      }\n\n      const foot = document.createElement(\"div\");\n      foot.className = \"foot\";\n      const co = document.createElement(\"span\");\n      co.className = \"company\";\n      if (f) co.style.setProperty(\"--co\", coInk(f.hue));\n      co.innerHTML = `${f ? '<span class=\"dot\"><\u002Fspan>' : ''}<span class=\"txt\">${company}<\u002Fspan>`;\n      const li = document.createElement(\"span\");\n      li.className = \"li\";\n      li.textContent = \"in\";\n      foot.append(co, li);\n\n      a.append(av, top, foot);\n      if (tags) top.appendChild(tags);\n      grid.appendChild(a);\n    });\n\n    updateFoot(list.length, people.length);\n  }\n\n  function updateFoot() {}\n\n  function refresh() {\n    const people = activePeople();\n    buildFacets(people);\n    render(people);\n  }\n\n  qEl.addEventListener(\"input\", refresh);\n  refresh();\n\n  // ---------- Tweaks panel ----------\n  const panel = document.createElement(\"div\");\n  panel.className = \"tweaks-panel\";\n  panel.innerHTML = `\n    <div class=\"tp-head\">\n      <h3>Tweaks<\u002Fh3>\n      <button class=\"tp-x\" aria-label=\"Close tweaks\">&times;<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tp-sec\">\n      <h4>Marquee teams<\u002Fh4>\n      <p class=\"hint\">Toggle a team off to delete it and remove its attendees from the list.<\u002Fp>\n      <div id=\"tp-teams\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tp-sec\">\n      <h4>Display<\u002Fh4>\n      <div id=\"tp-display\"><\u002Fdiv>\n    <\u002Fdiv>`;\n  document.body.appendChild(panel);\n\n  function makeSwitch(checked, onChange) {\n    const sw = document.createElement(\"button\");\n    sw.className = \"sw\";\n    sw.setAttribute(\"role\", \"switch\");\n    sw.setAttribute(\"aria-checked\", String(checked));\n    sw.onclick = () => {\n      const next = sw.getAttribute(\"aria-checked\") !== \"true\";\n      sw.setAttribute(\"aria-checked\", String(next));\n      onChange(next);\n    };\n    return sw;\n  }\n\n  function makeRow(labelHTML, sw) {\n    const row = document.createElement(\"div\");\n    row.className = \"tp-row\";\n    const lab = document.createElement(\"div\");\n    lab.className = \"lab\";\n    lab.innerHTML = labelHTML;\n    row.append(lab, sw);\n    return { row, lab };\n  }\n\n  const teamsWrap = panel.querySelector(\"#tp-teams\");\n  FEATURED.forEach(([key, hue]) => {\n    const present = !TWEAKS.deleted[key];\n    const sw = makeSwitch(present, (on) => {\n      TWEAKS.deleted[key] = !on;\n      r.lab.classList.toggle(\"gone\", !on);\n      persist({ deleted: TWEAKS.deleted });\n      refresh();\n    });\n    const r = makeRow(\n      `<span class=\"dot\" style=\"background:${coInk(hue)}\"><\u002Fspan>${key} <span class=\"ct\">${ORIG_COUNTS[key] || 0}<\u002Fspan>`,\n      sw\n    );\n    if (!present) r.lab.classList.add(\"gone\");\n    teamsWrap.appendChild(r.row);\n  });\n\n  const displayWrap = panel.querySelector(\"#tp-display\");\n  displayWrap.appendChild(makeRow(\"Colour highlights\",\n    makeSwitch(TWEAKS.colorHighlight, (on) => { TWEAKS.colorHighlight = on; persist({ colorHighlight: on }); refresh(); })).row);\n\n  // ---------- Host protocol ----------\n  function persist(edits) {\n    window.parent.postMessage({ type: \"__edit_mode_set_keys\", edits }, \"*\");\n  }\n  window.addEventListener(\"message\", (e) => {\n    const t = e.data && e.data.type;\n    if (t === \"__activate_edit_mode\") panel.classList.add(\"open\");\n    else if (t === \"__deactivate_edit_mode\") panel.classList.remove(\"open\");\n  });\n  panel.querySelector(\".tp-x\").onclick = () => {\n    panel.classList.remove(\"open\");\n    window.parent.postMessage({ type: \"__edit_mode_dismissed\" }, \"*\");\n  };\n  window.parent.postMessage({ type: \"__edit_mode_available\" }, \"*\");\n<\u002Fscript>\n  \n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
